<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Job<span>/</span>Tracker</div>
    <div class="login-title" id="login-title">Sign In</div>

    <form id="login-form" onsubmit="handleSubmit(event)" autocomplete="on" novalidate>
      <div class="login-field">
        <label for="l-email">Email</label>
        <input type="email" id="l-email" name="email" autocomplete="email" required placeholder="you@example.com" />
      </div>
      <div class="login-field">
        <label for="l-password">Password</label>
        <input type="password" id="l-password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      </div>
      <div class="login-field" id="confirm-field" style="display:none">
        <label for="l-confirm">Confirm Password</label>
        <input type="password" id="l-confirm" name="confirm" autocomplete="new-password" placeholder="••••••••" />
      </div>
      <div class="login-remember" id="remember-row">
        <label class="login-checkbox-label">
          <input type="checkbox" id="l-remember" />
          <span>Remember me for 30 days</span>
        </label>
      </div>
      <div id="login-error" class="login-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary login-submit" id="submit-btn">Sign In</button>
    </form>
    <div class="login-switch">
      <span id="switch-text">Don't have an account?</span>
      <button class="login-switch-link" id="switch-btn" onclick="toggleMode()">Create one</button>
    </div>
  </div>
</div>

<script>
let isRegisterMode = false;

async function init() {
  try {
    const res = await fetch('/auth/status');
    const data = await res.json();
    if (data.authenticated) {
      window.location.href = '/';
      return;
    }
    if (!data.registered) {
      setMode('register');
    }
  } catch (e) {
    showError('Could not reach server');
  }
}

function setMode(mode) {
  isRegisterMode = mode === 'register';
  document.getElementById('login-title').textContent = isRegisterMode ? 'Create Account' : 'Sign In';
  document.getElementById('confirm-field').style.display = isRegisterMode ? '' : 'none';
  document.getElementById('remember-row').style.display = isRegisterMode ? 'none' : '';
  document.getElementById('submit-btn').textContent = isRegisterMode ? 'Create Account' : 'Sign In';
  document.getElementById('l-password').autocomplete = isRegisterMode ? 'new-password' : 'current-password';
  document.getElementById('switch-text').textContent = isRegisterMode ? 'Already have an account?' : 'Don\'t have an account?';
  document.getElementById('switch-btn').textContent = isRegisterMode ? 'Sign in' : 'Create one';
  clearError();
}

function toggleMode() {
  setMode(isRegisterMode ? 'login' : 'register');
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = '';
}

function clearError() {
  const el = document.getElementById('login-error');
  el.style.display = 'none';
  el.textContent = '';
}

async function handleSubmit(e) {
  e.preventDefault();
  clearError();

  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;
  const btn = document.getElementById('submit-btn');

  if (isRegisterMode) {
    const confirm = document.getElementById('l-confirm').value;
    if (password !== confirm) { showError('Passwords do not match'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters'); return; }
  }

  btn.disabled = true;
  btn.textContent = isRegisterMode ? 'Creating account\u2026' : 'Signing in\u2026';

  try {
    const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';
    const body = isRegisterMode
      ? { email, password }
      : { email, password, rememberMe: document.getElementById('l-remember').checked };

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Something went wrong');
      btn.disabled = false;
      btn.textContent = isRegisterMode ? 'Create Account' : 'Sign In';
      return;
    }

    window.location.href = '/';
  } catch (err) {
    showError('Could not reach server');
    btn.disabled = false;
    btn.textContent = isRegisterMode ? 'Create Account' : 'Sign In';
  }
}

init();
</script>
</body>
</html>
