<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header>
  <div class="logo">Job<span>/</span>Tracker <span class="logo-slash">// </span><span class="logo-subtitle">mission control</span></div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num stat-num-active" id="stat-active">—</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num stat-num-interview" id="stat-interview">—</div><div class="stat-label">Interview</div></div>
    <div class="stat"><div class="stat-num stat-num-stale" id="stat-stale">—</div><div class="stat-label">Stale</div></div>
  </div>
</header>

<div class="theme-fab" id="theme-fab">
  <div class="theme-options" id="theme-options">
    <button class="theme-icon-btn" id="theme-system" onclick="setThemePreference('system')" title="System" aria-label="Use system theme">◐</button>
    <button class="theme-icon-btn" id="theme-dark" onclick="setThemePreference('dark')" title="Dark" aria-label="Use dark theme">☾</button>
    <button class="theme-icon-btn" id="theme-light" onclick="setThemePreference('light')" title="Light" aria-label="Use light theme">☀</button>
  </div>
  <button class="theme-fab-toggle" id="theme-fab-toggle" onclick="toggleThemeMenu()" aria-label="Theme options">◐</button>
</div>

<div class="settings-fab" id="settings-fab">
  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">Settings</div>
    <div class="settings-row">
      <label for="snooze-hours">Alert snooze</label>
      <div class="settings-input-group">
        <input type="number" id="snooze-hours" min="1" max="24" value="4" onchange="saveSnoozeHours(this.value)" />
        <span>hrs</span>
      </div>
    </div>
  </div>
  <button class="settings-fab-toggle" id="settings-fab-toggle" onclick="toggleSettingsPanel()" aria-label="Settings">⚙</button>
</div>

<div id="alert-banner">
  <div class="alert-icon">🔔</div>
  <div class="alert-body">
    <div class="alert-title">Attention Required</div>
    <div class="alert-message" id="alert-text"></div>
    <div class="alert-apps" id="alert-apps"></div>
  </div>
  <button class="alert-dismiss" onclick="dismissAlert()">×</button>
</div>

<main>
  <!-- Add Form -->
  <div class="add-section">
    <div class="section-header">Log New Application</div>
    <div class="form-grid">
      <div class="field">
        <label>Company *</label>
        <input type="text" id="f-company" list="company-suggestions" placeholder="Acme Corp" />
        <datalist id="company-suggestions"></datalist>
      </div>
      <div class="field">
        <label>Role</label>
        <input type="text" id="f-role" placeholder="Senior Engineer" />
      </div>
      <div class="field">
        <label>Portal / Tracking URL</label>
        <input type="url" id="f-url" placeholder="https://jobs.company.com/..." />
      </div>
      <div class="field">
        <label for="f-status">Status</label>
        <select id="f-status">
          <option value="applied">Applied</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
          <option value="waitlisted">Waitlisted</option>
          <option value="ghosted">Ghosted</option>
          <option value="rejected">Rejected</option>
          <option value="accepted">Accepted</option>
          <option value="withdrawn">Withdrawn</option>
        </select>
      </div>
      <div class="field">
        <label for="f-applied-date">Applied Date (optional)</label>
        <input type="date" id="f-applied-date" />
      </div>
      <div class="field field-end">
        <button class="btn btn-primary" onclick="addApplication()">+ Log It</button>
      </div>
    </div>
    <div class="field field-notes">
      <label>Notes</label>
      <input type="text" id="f-notes" placeholder="Referral from Sarah, applied via LinkedIn..." />
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-chip" data-filter="applied" onclick="setFilter('applied', this)">Applied</button>
    <button class="filter-chip" data-filter="interview" onclick="setFilter('interview', this)">Interview</button>
    <button class="filter-chip" data-filter="offer" onclick="setFilter('offer', this)">Offer</button>
    <button class="filter-chip" data-filter="stale" onclick="setFilter('stale', this)">⚡ Stale</button>
    <button class="filter-chip" data-filter="closed" onclick="setFilter('closed', this)">Closed</button>
    <select class="sort-select" onchange="setSort(this.value)" aria-label="Sort applications by date">
      <option value="newest" selected>Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
    <input class="search-input" type="text" placeholder="Search..." oninput="setSearch(this.value)" />
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div id="table-body">
      <div class="loading">LOADING APPLICATIONS...</div>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title">Edit Application</div>
    <div class="modal-grid">
      <div class="field"><label for="e-company">Company *</label><input type="text" id="e-company" /></div>
      <div class="field"><label for="e-role">Role</label><input type="text" id="e-role" /></div>
      <div class="field"><label for="e-url">Portal URL</label><input type="url" id="e-url" /></div>
      <div class="field">
        <label for="e-status">Status</label>
        <select id="e-status">
          <option value="applied">Applied</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
          <option value="waitlisted">Waitlisted</option>
          <option value="ghosted">Ghosted</option>
          <option value="rejected">Rejected</option>
          <option value="accepted">Accepted</option>
          <option value="withdrawn">Withdrawn</option>
        </select>
      </div>
      <div class="field"><label for="e-applied-date">Applied Date (optional)</label><input type="date" id="e-applied-date" /></div>
      <div class="field"><label for="e-notes">Notes</label><textarea id="e-notes"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
