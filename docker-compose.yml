services:
  postgres:
    image: postgres:16-alpine
    container_name: job-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobtracker}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-tracker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobtracker
      DB_USER: jobtracker
      DB_PASSWORD: ${POSTGRES_PASSWORD:-jobtracker}
      PORT: 3000
      STALE_DAYS: 3
      APPLIED_GHOST_DAYS: 21
      INTERVIEW_GHOST_DAYS: 5
      EMAIL_ALERTS_ENABLED: ${EMAIL_ALERTS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      LOG_DIR: /app/logs
      LOG_FILE: cron.log
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs:z

volumes:
  pg_data:
